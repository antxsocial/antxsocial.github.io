<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0b0b0b">
  <title>bio by antisocial</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(40, 5, 5, 0.5) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(20, 0, 0, 0.6) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(0,0,0,0.8) 0px, rgba(0,0,0,0.8) 2px, 
          rgba(15,0,0,0.3) 2px, rgba(15,0,0,0.3) 6px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      padding: 0.8rem;
      color: #e3d9d9;
      overflow-x: hidden;
    }

    .card {
      max-width: 620px;
      width: 100%;
      background: rgba(8, 6, 6, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 30, 30, 0.3);
      border-top: 1px solid rgba(180, 40, 40, 0.25);
      border-radius: 32px;
      padding: 2rem 1.8rem 2.2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(80, 10, 10, 0.1) inset, 0 0 25px rgba(150, 0, 0, 0.1);
      transition: box-shadow 0.3s ease;
      overflow-x: hidden;
    }

    /* Заголовок — всегда в одну строку, черепки по бокам не ломаются */
    .site-title {
      text-align: center;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-size: 1rem;
      color: #ac8e8e;
      text-shadow: 0 0 8px #4a0000, 0 0 2px #1f0000;
      border-bottom: 1px dashed #4f2a2a;
      padding-bottom: 0.9rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      white-space: nowrap;
      gap: 8px;
    }

    .site-title i {
      flex-shrink: 0;
      color: #8b3a3a;
      font-size: 1rem;
    }

    /* Если экран очень узкий — разрешаем прокрутку заголовка пальцем, но без переноса */
    @media (max-width: 480px) {
      .site-title {
        overflow-x: auto;
        scrollbar-width: none;
        justify-content: flex-start;
      }
      .site-title::-webkit-scrollbar {
        display: none;
      }
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    .avatar-frame {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: #0e0505;
      box-shadow: 0 0 0 2px #2f1111, 0 0 0 5px rgba(0,0,0,0.5), 0 0 25px #3a0000, inset 0 0 15px #1a0000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      transition: transform 0.2s;
      overflow: hidden;
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; }

    .whisper-text {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7a4f4f;
      border-left: 2px solid #5c2a2a;
      padding-left: 12px;
    }

    .status-text {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9e6b6b;
      margin-top: 8px;
      padding: 4px 12px;
      background: rgba(20, 5, 5, 0.4);
      border-radius: 30px;
      border: 1px solid #4a2020;
      text-align: center;
    }

    .contact-block {
      background: rgba(15, 5, 5, 0.5);
      border-radius: 28px;
      padding: 1.2rem 1.2rem 1rem;
      margin: 1.2rem 0 1.5rem;
      border: 1px solid #3f2020;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      padding: 0.2rem 0.3rem;
      border-bottom: 1px dotted #3e1f1f;
    }
    .contact-item:last-of-type { border-bottom: none; }

    .contact-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #bc9a9a;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      flex-shrink: 0;
    }
    .contact-label i { width: 22px; color: #9e3b3b; font-size: 1.2rem; }

    .flex-row {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
    }

    /* Блок с ником — строго одна строка, без переноса, обрезается */
    .contact-value {
      display: flex;
      align-items: center;
      background: #150a0a;
      padding: 0.2rem 0.8rem;
      border-radius: 50px;
      border: 1px solid #572828;
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
    }
    .contact-value a {
      color: #e0c0c0;
      text-decoration: none;
      white-space: nowrap;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 500;
      display: block;
      overflow-x: visible;
    }
    .contact-value a:hover { color: #ff8a8a; text-shadow: 0 0 5px #b30000; }

    .copy-btn {
      background: #1e0c0c;
      border: 1px solid #572828;
      color: #b17b7b;
      border-radius: 30px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #3f1c1c; color: #f0c0c0; border-color: #a14444; }

    .disclaimer {
      margin-top: 1.5rem;
      padding: 1.2rem;
      background: #0c0404;
      border-left: 5px solid #631e1e;
      border-radius: 12px 20px 20px 12px;
      font-size: 0.75rem;
      line-height: 1.6;
      color: #bba6a6;
      font-family: monospace;
    }
    .disclaimer-header {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      font-weight: 600;
      color: #bc7a7a;
      font-size: 0.7rem;
    }

    .ghost-note {
      margin-top: 1rem;
      text-align: right;
      font-size: 0.65rem;
      color: #4f3737;
      border-top: 1px dashed #2f1a1a;
      padding-top: 0.8rem;
    }

    .toast-msg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0808;
      color: #e6c3c3;
      border: 1px solid #7a3030;
      padding: 8px 20px;
      border-radius: 60px;
      font-family: monospace;
      font-size: 0.8rem;
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast-msg.show { opacity: 1; }

    @media (max-width: 540px) {
      .card { padding: 1.5rem 1rem; }
      .contact-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .flex-row { width: 100%; }
      .contact-value a { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="site-title">
    <i class="fas fa-skull"></i>
    <span>bio by antisocial</span>
    <i class="fas fa-skull"></i>
  </div>

  <div class="avatar-section">
    <div class="avatar-frame">
      <img src="image.JPG" alt="avatar" class="avatar-img">
    </div>
    <div class="whisper-text">WAKEN ONES' DEAD</div>
    <div class="status-text">супер крутой мортис<br>тир 1 бруда этого мира</div>
  </div>

  <div class="contact-block">
    <!-- Telegram с ОЧЕНЬ длинным ником (одна строка, обрезается) -->
    <div class="contact-item">
      <div class="contact-label"><i class="fab fa-telegram-plane"></i> Telegram</div>
      <div class="flex-row">
        <div class="contact-value">
          <a href="https://t.me/XAXAXAXXAXAXAXAXAXXAXAXAAXXA" target="_blank">@XAXAXAXXAXAXAXAXAXXAXAXAAXXA</a>
        </div>
        <button class="copy-btn" data-copy="@XAXAXAXXAXAXAXAXAXXAXAXAAXXA"><i class="far fa-copy"></i></button>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-label"><i class="fab fa-tiktok"></i> TikTok</div>
      <div class="flex-row">
        <div class="contact-value"><a href="https://www.tiktok.com/@prokxznik" target="_blank">@prokxznik</a></div>
        <button class="copy-btn" data-copy="@prokxznik"><i class="far fa-copy"></i></button>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-label"><i class="fas fa-phone-alt"></i> Телефон</div>
      <div class="flex-row">
        <div class="contact-value"><a href="tel:+19525201095">+1 952 520 1095</a></div>
        <button class="copy-btn" data-copy="+19525201095"><i class="far fa-copy"></i></button>
      </div>
    </div>
  </div>

  <div class="disclaimer">
    <div class="disclaimer-header"><i class="fas fa-triangle-exclamation"></i> DISCLAIMER <i class="fas fa-triangle-exclamation"></i></div> санрайс друн  </div>
  <div class="ghost-note"><i class="far fa-eye-slash"></i> void • contact</div>
</div>

<div id="copyToast" class="toast-msg">☠ скопировано</div>

<script>
  const toast = document.getElementById('copyToast');
  function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1500); }
  async function copyText(text) {
    try { await navigator.clipboard.writeText(text); showToast('☠ ' + text + '  — скопировано'); }
    catch { 
      let ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('☠ скопировано');
    }
  }
  document.querySelectorAll('[data-copy]').forEach(btn => btn.addEventListener('click', e => { e.preventDefault(); copyText(btn.getAttribute('data-copy')); }));
</script>
</body>
</html>
